version: '2'

services:
  database:
    image: postgres:18
    container_name: database
    ports:
      - "5432:5432"
    expose:
      - 5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

  app:
    image: 'tiny-doodle:1.0-SNAPSHOT'
    container_name: app
    ports:
      - "8080:8080"